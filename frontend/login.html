<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — CampusEvents</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <!-- Brand Panel -->
    <div class="auth-brand">
      <div class="logo-mark">🎓</div>
      <h1>Campus Events</h1>
      <p>Discover, register, and manage events happening across your campus.</p>
    </div>

    <!-- Form Panel -->
    <div class="auth-form-area">
      <div class="auth-box">
        <h2>Welcome back</h2>
        <p class="sub">Sign in to your account to continue</p>

        <div class="alert alert-error" id="errorMsg"></div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@university.edu" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>

        <button class="btn btn-primary" id="loginBtn">Sign In</button>

        <p style="text-align:center; margin-top:1.5rem; font-size:0.9rem; color:var(--muted)">
          Don't have an account? <a href="register.html">Register here</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
