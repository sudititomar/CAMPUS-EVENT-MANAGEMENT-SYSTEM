<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — CampusEvents</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal-box {
      background: var(--bg-card, #fff);
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 680px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text-muted, #666);
    }
    .table-wrap { overflow-x: auto; }
    .participants-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .participants-table th,
    .participants-table td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border, #eee);
    }
    .participants-table th {
      background: var(--bg-subtle, #f5f5f5);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="mark">🎓</div>
        <span>CampusEvents</span>
      </div>

      <a href="dashboard.html" class="nav-link active">
        <span>📅</span> All Events
      </a>
      <a href="my-registrations.html" class="nav-link">
        <span>🎟️</span> My Registrations
      </a>
      <!-- Only shown for organizers via JS -->
      <a href="create-event.html" class="nav-link" id="createLink" style="display:none">
        <span>➕</span> Create Event
      </a>

      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="avatar" id="avatarInitial">?</div>
          <div class="info">
            <strong id="userName">Loading…</strong>
            <small id="userRole">—</small>
          </div>
          <button class="btn-logout" id="logoutBtn" title="Logout">⏻</button>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <div class="page-header">
        <div>
          <h2>Upcoming Events</h2>
          <p>Browse and register for events on campus</p>
        </div>
      </div>

      <div class="alert alert-success" id="successMsg"></div>
      <div class="alert alert-error"   id="errorMsg"></div>

      <div class="events-grid" id="eventsGrid">
        <div class="spinner"></div>
      </div>
    </main>
  </div>

  <!-- Participants Modal — must be before script tag -->
  <div id="participantsModal" style="display:none"></div>

  <script src="js/dashboard.js"></script>
</body>
</html>
