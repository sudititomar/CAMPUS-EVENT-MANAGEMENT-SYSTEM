<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — CampusEvents</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="mark">🎓</div>
        <span>CampusEvents</span>
      </div>

      <a href="dashboard.html" class="nav-link active">
        <span>📅</span> All Events
      </a>
      <a href="my-registrations.html" class="nav-link">
        <span>🎟️</span> My Registrations
      </a>
      <!-- Only shown for organizers via JS -->
      <a href="create-event.html" class="nav-link" id="createLink" style="display:none">
        <span>➕</span> Create Event
      </a>

      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="avatar" id="avatarInitial">?</div>
          <div class="info">
            <strong id="userName">Loading…</strong>
            <small id="userRole">—</small>
          </div>
          <button class="btn-logout" id="logoutBtn" title="Logout">⏻</button>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <div class="page-header">
        <div>
          <h2>Upcoming Events</h2>
          <p>Browse and register for events on campus</p>
        </div>
      </div>

      <div class="alert alert-success" id="successMsg"></div>
      <div class="alert alert-error"   id="errorMsg"></div>

      <div class="events-grid" id="eventsGrid">
        <div class="spinner"></div>
      </div>
    </main>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
