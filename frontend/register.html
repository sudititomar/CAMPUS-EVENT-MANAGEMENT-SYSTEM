<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — CampusEvents</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <!-- Brand Panel -->
    <div class="auth-brand">
      <div class="logo-mark">🎓</div>
      <h1>Join Campus Events</h1>
      <p>Create an account to start exploring and registering for events.</p>
    </div>

    <!-- Form Panel -->
    <div class="auth-form-area">
      <div class="auth-box">
        <h2>Create account</h2>
        <p class="sub">It only takes a minute</p>

        <div class="alert alert-error"   id="errorMsg"></div>
        <div class="alert alert-success" id="successMsg"></div>

        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Jane Smith" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@university.edu" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 6 characters" />
        </div>

        <div class="form-group">
          <label for="role">I am a…</label>
          <select id="role">
            <option value="student">Student</option>
            <option value="organizer">Event Organizer</option>
          </select>
        </div>

        <button class="btn btn-primary" id="registerBtn">Create Account</button>

        <p style="text-align:center; margin-top:1.5rem; font-size:0.9rem; color:var(--muted)">
          Already have an account? <a href="login.html">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/register.js"></script>
</body>
</html>
