<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Event — CampusEvents</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="mark">🎓</div>
        <span>CampusEvents</span>
      </div>

      <a href="dashboard.html" class="nav-link">
        <span>📅</span> All Events
      </a>
      <a href="my-registrations.html" class="nav-link">
        <span>🎟️</span> My Registrations
      </a>
      <a href="create-event.html" class="nav-link active">
        <span>➕</span> Create Event
      </a>

      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="avatar" id="avatarInitial">?</div>
          <div class="info">
            <strong id="userName">Loading…</strong>
            <small id="userRole">—</small>
          </div>
          <button class="btn-logout" id="logoutBtn" title="Logout">⏻</button>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <div class="page-header">
        <div>
          <h2>Create Event</h2>
          <p>Fill in the details to publish a new event</p>
        </div>
        <a href="dashboard.html" class="btn btn-outline btn-sm">← Back</a>
      </div>

      <div class="alert alert-error"   id="errorMsg"></div>
      <div class="alert alert-success" id="successMsg"></div>

      <div class="form-card">
        <div class="form-group">
          <label for="title">Event Title</label>
          <input type="text" id="title" placeholder="e.g. Annual Tech Fest 2025" />
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" placeholder="Tell attendees what this event is about…"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" placeholder="e.g. Auditorium Block-A" />
          </div>
          <div class="form-group">
            <label for="capacity">Capacity</label>
            <input type="number" id="capacity" placeholder="100" min="1" />
          </div>
        </div>

        <div class="form-group">
          <label for="date">Date &amp; Time</label>
          <input type="datetime-local" id="date" />
        </div>

        <button class="btn btn-primary" id="createBtn">Publish Event</button>
      </div>
    </main>
  </div>

  <script src="js/create-event.js"></script>
</body>
</html>
